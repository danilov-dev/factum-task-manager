<button
        hx-post="{% url 'subscriptions:switch' idea.id %}"
        hx-target="this"
        hx-swap="outerHTML"
        hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
        class="like-btn"
        title="{% if is_subscribed %}Отписаться от уведомлений{% else %}Получать уведомления об изменениях{% endif %}"
>
    {% if is_subscribed %}
    <svg class="icon icon-link" xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><title
            xmlns="">
        отписаться</title>
        <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5">
            <path d="M3 13c3.6-8 14.4-8 18 0"/>
            <path fill="currentColor" d="M12 17a3 3 0 1 1 0-6a3 3 0 0 1 0 6"/>
        </g>
    </svg>
    {% else %}
    <svg class="icon icon-link" xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewBox="0 0 24 24"><title xmlns="">подписаться</title>
        <g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5">
            <path d="M3 13c3.6-8 14.4-8 18 0"/>
            <path d="M12 17a3 3 0 1 1 0-6a3 3 0 0 1 0 6"/>
        </g>
    </svg>
    {% endif %}
</button>
