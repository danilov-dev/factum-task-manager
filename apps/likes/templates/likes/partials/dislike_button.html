{% load static %}

<button
        hx-post="{% url 'likes:switch_like' content_type object_id %}"
        hx-target="this"
        hx-swap="outerHTML"
        hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
        class="like-btn text-cluster"
        type="button">
    {% if user_reaction and user_reaction == -1 %}
    <svg class="icon icon-link like-icon" xmlns="http://www.w3.org/2000/svg" width="1em" height="1em"
         viewBox="0 0 24 24"><title xmlns="">
        thumb-down</title>
        <path fill="currentColor"
              d="M6 3h10v13l-7 7l-1.25-1.25q-.175-.175-.288-.475T7.35 20.7v-.35L8.45 16H3q-.8 0-1.4-.6T1 14v-2q0-.175.037-.375t.113-.375l3-7.05q.225-.5.75-.85T6 3m12 13V3h4v13z"/>
    </svg>
    {% else %}
    <svg class="icon icon-link negative like-icon" xmlns="http://www.w3.org/2000/svg" width="1em" height="1em"
         viewBox="0 0 24 24"><title xmlns="">
        thumb-down-outline</title>
        <path fill="currentColor"
              d="M6 3h11v13l-7 7l-1.25-1.25q-.175-.175-.288-.475T8.35 20.7v-.35L9.45 16H3q-.8 0-1.4-.6T1 14v-2q0-.175.05-.375t.1-.375l3-7.05q.225-.5.75-.85T6 3m9 2H6l-3 7v2h9l-1.35 5.5L15 15.15zm0 10.15V5zm2 .85v-2h3V5h-3V3h5v13z"/>
    </svg>
    {% endif %}
    <span>{{ score }}</span>
</button>
