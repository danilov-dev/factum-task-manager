{% load static %}
<div class="like-box cluster">

    {# Кнопка лайка #}
    <button
            hx-post="{% url 'likes:switch_like' content_type object_id %}"
            hx-vals='{"value": 1}'
            hx-target="closest .like-box"
            hx-swap="outerHTML"
            hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
            class="like-btn text-cluster {% if user_reaction == 1 %}active{% endif %}"
            type="button">

        {% if user_reaction == 1 %}
        {# Закрашенный лайк #}
        <svg class="icon icon-link like-icon" xmlns="http://www.w3.org/2000/svg" width="1em" height="1em"
             viewBox="0 0 24 24">
            <title>thumb-up</title>
            <path fill="currentColor"
                  d="M18 21H8V8l7-7l1.25 1.25q.175.175.288.475t.112.575v.35L15.55 8H21q.8 0 1.4.6T23 10v2q0 .175-.037.375t-.113.375l-3 7.05q-.225.5-.75.85T18 21M6 8v13H2V8z"/>
        </svg>
        {% else %}
        {# Контурный лайк #}
        <svg class="icon icon-link positive like-icon" xmlns="http://www.w3.org/2000/svg" width="1em" height="1em"
             viewBox="0 0 24 24">
            <title>thumb-up-outline</title>
            <path fill="currentColor"
                  d="M18 21H7V8l7-7l1.25 1.25q.175.175.288.475t.112.575v.35L14.55 8H21q.8 0 1.4.6T23 10v2q0 .175-.05.375t-.1.375l-3 7.05q-.225.5-.75.85T18 21m-9-2h9l3-7v-2h-9l1.35-5.5L9 8.85zM9 8.85V19zM7 8v2H4v9h3v2H2V8z"/>
        </svg>
        {% endif %}
    </button>
    <span class="score">{{ score }}</span>
    {# Кнопка дизлайка #}
    <button
            hx-post="{% url 'likes:switch_like' content_type object_id %}"
            hx-vals='{"value": -1}'
            hx-target="closest .like-box"
            hx-swap="outerHTML"
            hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
            class="dislike-btn text-cluster {% if user_reaction == -1 %}active{% endif %}"
            type="button">

        {% if user_reaction == -1 %}
        {# Закрашенный дизлайк #}
        <svg class="icon icon-link like-icon" xmlns="http://www.w3.org/2000/svg" width="1em" height="1em"
             viewBox="0 0 24 24">
            <title>thumb-down</title>
            <path fill="currentColor"
                  d="M6 3h10v13l-7 7l-1.25-1.25q-.175-.175-.288-.475T7.35 20.7v-.35L8.45 16H3q-.8 0-1.4-.6T1 14v-2q0-.175.037-.375t.113-.375l3-7.05q.225-.5.75-.85T6 3m12 13V3h4v13z"/>
        </svg>
        {% else %}
        {# Контурный дизлайк #}
        <svg class="icon icon-link negative like-icon" xmlns="http://www.w3.org/2000/svg" width="1em" height="1em"
             viewBox="0 0 24 24">
            <title>thumb-down-outline</title>
            <path fill="currentColor"
                  d="M6 3h11v13l-7 7l-1.25-1.25q-.175-.175-.288-.475T8.35 20.7v-.35L9.45 16H3q-.8 0-1.4-.6T1 14v-2q0-.175.05-.375t-.1-.375l3-7.05q.225-.5.75-.85T6 3m9 2H6l-3 7v2h9l-1.35 5.5L15 15.15zm0 10.15V5zm2 .85v-2h3V5h-3V3h5v13z"/>
        </svg>
        {% endif %}
    </button>


</div>
