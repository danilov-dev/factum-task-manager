{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>Отклик на роль: {{ role.title }}</h1>
    <p><strong>Идея:</strong> <a href="{% url 'ideas:detail' pk=idea.pk %}">{{ idea.title }}</a></p>
    <p><strong>Автор:</strong> {{ idea.author.username }}</p>
    
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Отправить отклик</button>
        <a href="{% url 'ideas:detail' pk=idea.pk %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
