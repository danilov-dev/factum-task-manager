{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h2>Добавление роли для "{{ idea.title }}"</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Создать</button>
        <a href="{% url 'ideas:detail' idea.pk %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
