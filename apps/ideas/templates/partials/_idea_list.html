<div class="ideas-list">
    {% for idea in ideas %}
        {% include 'partials/_idea_list_item.html' with idea=idea %}
    {% empty %}
        <div class="alert alert-info">
            {% if search_query %}
                По запросу "{{ search_query }}" ничего не найдено.
            {% else %}
                Список идей пуст.
            {% endif %}
        </div>
    {% endfor %}
</div>
