{% extends 'base.html' %}
{%block title%} SignUp {%endblock%}

{% block content %}
<div class=" input-card">
    <h1>SignUp</h1>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_username" class="form-label">Имя пользователя</label>
            <input type="text"
                   name="username"
                   id="id_username"
                   class="form-control"
                   required
                   autofocus
                   autocomplete="username">
        </div>

        <div class="form-group">
            <label for="id_email" class="form-label">Email</label>
            <input type="text"
                   name="email"
                   id="id_email"
                   class="form-control"
                   required
                   autofocus
                   autocomplete="email">
        </div>

        <div class="form-group">
            <label for="id_password1" class="form-label">Пароль</label>
            <input type="password"
                   name="password1"
                   id="id_password1"
                   class="form-control"
                   required
                   autocomplete="new-password">
        </div>

        <div class="form-group">
            <label for="id_password2" class="form-label">Подтверждение пароля</label>
            <input type="password"
                   name="password2"
                   id="id_password2"
                   class="form-control"
                   required
                   autocomplete="new-password">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%;">Войти</button>
    </form>
</div>
{% endblock %}
